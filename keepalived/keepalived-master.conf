# ============================================================
# Keepalived – Nodo MASTER
# Instalación en Ubuntu/Debian:
#   sudo apt install keepalived
#   sudo cp keepalived-master.conf /etc/keepalived/keepalived.conf
#   sudo systemctl enable keepalived && sudo systemctl start keepalived
#
# Ajustá antes de copiar:
#   interface   → tu interfaz de red (ip a | grep ens / eth)
#   virtual_ipaddress → la VIP flotante que usarán los clientes
#   auth_pass   → cambiá por una contraseña propia
# ============================================================

vrrp_script check_nginx {
    script "pgrep nginx"   # Nginx debe estar corriendo para ser MASTER
    interval 2             # Verifica cada 2 segundos
    weight   2             # Si falla, baja 2 puntos de prioridad
    fall     2             # 2 fallos seguidos = script fallido
    rise     1             # 1 éxito = script recuperado
}

vrrp_instance VI_TECHSTORE {
    state  MASTER
    interface eth0                # ← cambiá por tu interfaz (ej: ens33, enp0s3)
    virtual_router_id 51          # Debe ser igual en MASTER y BACKUP
    priority  101                 # MASTER tiene prioridad más alta que BACKUP (100)
    advert_int 1                  # Anuncia su estado cada 1 segundo

    authentication {
        auth_type PASS
        auth_pass techstore360    # ← cambiá esta contraseña
    }

    virtual_ipaddress {
        192.168.1.100/24          # ← VIP flotante (ajustá a tu red)
    }

    track_script {
        check_nginx
    }
}
